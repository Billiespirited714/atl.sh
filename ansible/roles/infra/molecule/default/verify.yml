---
- name: Verify
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Assert sshd is running
      ansible.builtin.service_facts:

    - name: Assert security services are running
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['sshd.service'].state == 'running'"
          - "ansible_facts.services['fail2ban.service'].state == 'running'"
          - "ansible_facts.services['auditd.service'].state == 'running'"
          - "ansible_facts.services['node_exporter.service'].state == 'running'"
        fail_msg: "One or more security services are not running"

    - name: Check sshd_config for key settings
      ansible.builtin.command: sshd -T
      register: sshd_config
      changed_when: false

    - name: Assert sshd hardening settings
      ansible.builtin.assert:
        that:
          - "'passwordauthentication no' in sshd_config.stdout"
          - "'maxauthtries 3' in sshd_config.stdout"
        fail_msg: "sshd is not hardened as expected"

    - name: Check UFW status
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Assert UFW is active
      ansible.builtin.assert:
        that:
          - "'Status: active' in ufw_status.stdout"
        fail_msg: "UFW firewall is not active"

    - name: Check node_exporter is listening on localhost:9100
      ansible.builtin.command: ss -tlnp
      register: listening_ports
      changed_when: false

    - name: Assert node_exporter is bound to localhost only
      ansible.builtin.assert:
        that:
          - "'127.0.0.1:9100' in listening_ports.stdout"
        fail_msg: "node_exporter is not listening on 127.0.0.1:9100"

    - name: Check AIDE database exists
      ansible.builtin.stat:
        path: /var/lib/aide/aide.db
      register: aide_db

    - name: Assert AIDE database is present
      ansible.builtin.assert:
        that:
          - aide_db.stat.exists
        fail_msg: "AIDE database not found at /var/lib/aide/aide.db"

    - name: Check borgmatic config exists
      ansible.builtin.stat:
        path: /etc/borgmatic/config.yaml
      register: borgmatic_config

    - name: Assert borgmatic config is present
      ansible.builtin.assert:
        that:
          - borgmatic_config.stat.exists
        fail_msg: "borgmatic config not found"
