---
- name: Converge
  hosts: all
  gather_facts: true
  become: true

  vars:
    pubnix_domain: atl.sh
    admin_email: admin@allthingslinux.org
    timezone: UTC
    ntp_timezone: UTC
    ntp_manage_config: true
    ntp_servers:
      - 0.pool.ntp.org iburst
      - 1.pool.ntp.org iburst

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
