---
- name: Verify
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: apt

    - name: Assert key packages are installed
      ansible.builtin.assert:
        that:
          - "'zsh' in ansible_facts.packages"
          - "'fish' in ansible_facts.packages"
          - "'neovim' in ansible_facts.packages"
          - "'git' in ansible_facts.packages"
          - "'tmux' in ansible_facts.packages"
          - "'python3' in ansible_facts.packages"
          - "'golang' in ansible_facts.packages"
          - "'rustc' in ansible_facts.packages"
          - "'ripgrep' in ansible_facts.packages"
          - "'fzf' in ansible_facts.packages"
        fail_msg: "One or more expected packages are missing"

    - name: Read /etc/shells
      ansible.builtin.slurp:
        src: /etc/shells
      register: shells_file

    - name: Assert shells are registered in /etc/shells
      ansible.builtin.assert:
        that:
          - "'/usr/bin/zsh' in (shells_file.content | b64decode)"
          - "'/usr/bin/fish' in (shells_file.content | b64decode)"
          - "'/bin/mksh' in (shells_file.content | b64decode)"
        fail_msg: "One or more shells missing from /etc/shells"

    - name: Check journald SystemMaxUse
      ansible.builtin.command: grep -E '^SystemMaxUse=' /etc/systemd/journald.conf
      register: journald_conf
      changed_when: false

    - name: Assert journald is capped at 1G
      ansible.builtin.assert:
        that:
          - "'SystemMaxUse=1G' in journald_conf.stdout"
        fail_msg: "journald SystemMaxUse is not set to 1G"
